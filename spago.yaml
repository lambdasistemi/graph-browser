package:
  name: graph-browser
  dependencies:
    - prelude
    - effect
    - aff
    - console
    - halogen
    - argonaut
    - argonaut-codecs
    - arrays
    - maybe
    - either
    - foldable-traversable
    - tuples
    - web-html
    - web-dom
    - strings
    - ordered-collections
    - refs
    - aff-promise
    - web-events
    - web-storage
    - foreign
    - foreign-object
    - dom-indexed
    - fetch
  bundle:
    module: Main
    outfile: dist/index.js
