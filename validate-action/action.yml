name: 'Validate Graph Browser Data'
description: 'Validate graph-browser data/ directory against schemas and referential integrity'

inputs:
  data-dir:
    description: 'Path to the data directory'
    required: false
    default: 'data'
  schema-ref:
    description: 'Git ref to fetch schemas from (tag, branch, or SHA)'
    required: false
    default: 'main'

runs:
  using: 'composite'
  steps:
    - name: Fetch schemas
      shell: bash
      run: |
        SCHEMA_DIR=$(mktemp -d)
        echo "SCHEMA_DIR=$SCHEMA_DIR" >> "$GITHUB_ENV"
        for f in config.schema.json graph.schema.json tutorial-index.schema.json tutorial.schema.json; do
          curl -sfL "https://raw.githubusercontent.com/lambdasistemi/graph-browser/${{ inputs.schema-ref }}/schema/$f" -o "$SCHEMA_DIR/$f"
        done

    - name: Install validator
      shell: bash
      run: npm install ajv-cli ajv-formats

    - name: Validate schemas
      shell: bash
      run: |
        DATA="${{ inputs.data-dir }}"
        npx ajv validate -s "$SCHEMA_DIR/config.schema.json" -d "$DATA/config.json" -c ajv-formats --spec=draft2020
        npx ajv validate -s "$SCHEMA_DIR/graph.schema.json" -d "$DATA/graph.json" -c ajv-formats --spec=draft2020
        if [ -f "$DATA/tutorials/index.json" ]; then
          npx ajv validate -s "$SCHEMA_DIR/tutorial-index.schema.json" -d "$DATA/tutorials/index.json" -c ajv-formats --spec=draft2020
          for f in "$DATA"/tutorials/*.json; do
            [ "$(basename "$f")" = "index.json" ] && continue
            echo "Validating $f"
            npx ajv validate -s "$SCHEMA_DIR/tutorial.schema.json" -d "$f" -c ajv-formats --spec=draft2020
          done
        fi

    - name: Check referential integrity
      shell: bash
      run: |
        DATA="${{ inputs.data-dir }}"
        node -e "
          const d=require('./$DATA/graph.json');
          const c=require('./$DATA/config.json');
          const ids=new Set(d.nodes.map(n=>n.id));
          const kinds=Object.keys(c.kinds);
          let ok=true;
          d.nodes.forEach(n=>{
            if(!kinds.includes(n.kind)){console.error('Unknown kind: '+n.kind+' on '+n.id);ok=false}
          });
          d.edges.forEach((e,i)=>{
            if(!ids.has(e.source)){console.error('Bad source e'+i+': '+e.source);ok=false}
            if(!ids.has(e.target)){console.error('Bad target e'+i+': '+e.target);ok=false}
          });
          const fs=require('fs');
          const tutDir='./$DATA/tutorials';
          if(fs.existsSync(tutDir)){
            fs.readdirSync(tutDir).filter(f=>f.endsWith('.json')&&f!=='index.json').forEach(f=>{
              const tut=JSON.parse(fs.readFileSync(tutDir+'/'+f,'utf8'));
              (tut.stops||[]).forEach((s,i)=>{
                if(!ids.has(s.node)){console.error(f+' stop '+i+': unknown node '+s.node);ok=false}
              });
            });
          }
          if(ok)console.log(d.nodes.length+' nodes, '+d.edges.length+' edges — validation passed');
          else process.exit(1);
        "
