name: 'Validate Graph Browser Data'
description: 'Validate graph-browser data/ directory against schemas and referential integrity'

inputs:
  data-dir:
    description: 'Path to the data directory'
    required: false
    default: 'data'
  rdf-dir:
    description: 'Path to the RDF directory for optional SHACL validation'
    required: false
    default: 'data/rdf'
  schema-ref:
    description: 'Git ref to fetch schemas from (tag, branch, or SHA)'
    required: false
    default: 'main'
  schema-dir:
    description: 'Local path to schemas (skips fetching from GitHub)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Fetch schemas
      shell: bash
      run: |
        if [ -n "${{ inputs.schema-dir }}" ]; then
          echo "SCHEMA_DIR=${{ inputs.schema-dir }}" >> "$GITHUB_ENV"
        else
          SCHEMA_DIR=$(mktemp -d)
          echo "SCHEMA_DIR=$SCHEMA_DIR" >> "$GITHUB_ENV"
          for f in config.schema.json graph.schema.json tutorial-index.schema.json tutorial.schema.json view.schema.json; do
            curl -sfL "https://raw.githubusercontent.com/lambdasistemi/graph-browser/${{ inputs.schema-ref }}/schema/$f" -o "$SCHEMA_DIR/$f"
          done
        fi

    - name: Install validator
      shell: bash
      run: npm install ajv-cli ajv-formats

    - name: Install SHACL validator
      shell: bash
      run: |
        JENA_VERSION=6.0.0
        JENA_DIR=$(mktemp -d)
        curl -sfL "https://archive.apache.org/dist/jena/binaries/apache-jena-${JENA_VERSION}.tar.gz" | tar -xz -C "$JENA_DIR"
        echo "$JENA_DIR/apache-jena-${JENA_VERSION}/bin" >> "$GITHUB_PATH"

    - name: Validate schemas
      shell: bash
      run: |
        DATA="${{ inputs.data-dir }}"
        npx ajv validate -s "$SCHEMA_DIR/config.schema.json" -d "$DATA/config.json" -c ajv-formats --spec=draft2020
        npx ajv validate -s "$SCHEMA_DIR/graph.schema.json" -d "$DATA/graph.json" -c ajv-formats --spec=draft2020
        if [ -f "$DATA/tutorials/index.json" ]; then
          npx ajv validate -s "$SCHEMA_DIR/tutorial-index.schema.json" -d "$DATA/tutorials/index.json" -c ajv-formats --spec=draft2020
          for f in "$DATA"/tutorials/*.json; do
            [ "$(basename "$f")" = "index.json" ] && continue
            echo "Validating $f"
            npx ajv validate -s "$SCHEMA_DIR/tutorial.schema.json" -d "$f" -c ajv-formats --spec=draft2020
          done
        fi
        if [ -d "$DATA/views" ]; then
          for f in "$DATA"/views/*.json; do
            [ "$(basename "$f")" = "index.json" ] && continue
            echo "Validating view $f"
            npx ajv validate -s "$SCHEMA_DIR/view.schema.json" -d "$f" -c ajv-formats --spec=draft2020
          done
        fi

    - name: Check referential integrity
      shell: bash
      run: |
        DATA="${{ inputs.data-dir }}"
        node -e "
          const fs=require('fs');
          const d=require('./$DATA/graph.json');
          const c=require('./$DATA/config.json');
          const ids=new Set(d.nodes.map(n=>n.id));
          const kinds=Object.keys(c.kinds);
          let ok=true;
          d.nodes.forEach(n=>{
            if(!kinds.includes(n.kind)){console.error('Unknown kind: '+n.kind+' on '+n.id);ok=false}
          });
          d.edges.forEach((e,i)=>{
            if(!ids.has(e.source)){console.error('Bad source e'+i+': '+e.source);ok=false}
            if(!ids.has(e.target)){console.error('Bad target e'+i+': '+e.target);ok=false}
          });
          const tutDir='./$DATA/tutorials';
          if(fs.existsSync(tutDir)){
            fs.readdirSync(tutDir).filter(f=>f.endsWith('.json')&&f!=='index.json').forEach(f=>{
              const tut=JSON.parse(fs.readFileSync(tutDir+'/'+f,'utf8'));
              (tut.stops||[]).forEach((s,i)=>{
                if(!ids.has(s.node)){console.error(f+' stop '+i+': unknown node '+s.node);ok=false}
              });
            });
          }
          // Build edge lookup for view validation
          const edgeSet=new Set(d.edges.map(e=>e.source+'|'+e.target+'|'+e.label));
          const viewDir='./$DATA/views';
          if(fs.existsSync(viewDir)){
            fs.readdirSync(viewDir).filter(f=>f.endsWith('.json')).forEach(f=>{
              const view=JSON.parse(fs.readFileSync(viewDir+'/'+f,'utf8'));
              const viewNodes=new Set();
              (view.edges||[]).forEach((triple,i)=>{
                const key=triple[0]+'|'+triple[1]+'|'+triple[2];
                if(!edgeSet.has(key)){
                  console.error('views/'+f+' edge '+i+': ['+triple.join(', ')+'] not found in graph.json');
                  ok=false;
                } else {
                  viewNodes.add(triple[0]);
                  viewNodes.add(triple[1]);
                }
              });
              (view.tours||[]).forEach(tour=>{
                (tour.stops||[]).forEach((s,i)=>{
                  if(!viewNodes.has(s.node)){
                    console.error('views/'+f+' tour \"'+tour.title+'\" stop '+i+': node \"'+s.node+'\" not reachable from view edges');
                    ok=false;
                  }
                });
              });
            });
          }
          if(ok){
            let msg=d.nodes.length+' nodes, '+d.edges.length+' edges';
            const viewFiles=fs.existsSync(viewDir)?fs.readdirSync(viewDir).filter(f=>f.endsWith('.json')):[];
            if(viewFiles.length>0) msg+=', '+viewFiles.length+' view(s)';
            console.log(msg+' — validation passed');
          }
          else process.exit(1);
        "

    - name: Validate RDF contracts
      shell: bash
      run: |
        RDF="${{ inputs.rdf-dir }}"
        ran=false

        if [ -f "$RDF/graph.ttl" ] && [ -f "$RDF/shapes.ttl" ]; then
          echo "Validating RDF instance data"
          shacl validate --shapes "$RDF/shapes.ttl" --data "$RDF/graph.ttl"
          ran=true
        fi

        if [ -f "$RDF/application-ontology.ttl" ] && [ -f "$RDF/application-shapes.ttl" ]; then
          echo "Validating application ontology"
          shacl validate --shapes "$RDF/application-shapes.ttl" --data "$RDF/application-ontology.ttl"
          ran=true
        fi

        if [ "$ran" = false ]; then
          echo "No RDF validation artifacts found in $RDF; skipping SHACL validation"
        fi
