<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  .graph-container {
    flex: 1;
    position: relative;
  }

  #cy {
    width: 100%;
    height: 100%;
  }

  .controls {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 8px;
    z-index: 5;
    flex-wrap: wrap;
    max-width: calc(100% - 24px);
  }

  .control-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .control-btn:hover { background: #30363d; border-color: #8b949e; }
  .control-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }

  .search-container {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
    width: 300px;
  }

  .search-input {
    width: 100%;
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }

  .search-input:focus { border-color: #58a6ff; background: #161b22; }

  .search-results {
    background: #161b22;
    border: 1px solid #30363d;
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 400px;
    overflow-y: auto;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s ease;
  }

  .search-result-item:hover { background: #21262d; }

  .search-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .search-result-label {
    color: #f0f6fc;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .search-result-kind {
    color: #8b949e;
    font-size: 11px;
    white-space: nowrap;
  }

  .depth-control {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .depth-label {
    font-size: 12px;
    color: #8b949e;
  }

  .depth-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s ease;
    min-width: 32px;
  }

  .depth-btn:hover { background: #30363d; border-color: #8b949e; }
  .depth-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }

  .filters {
    position: absolute;
    top: 48px;
    left: 12px;
    display: flex;
    gap: 6px;
    z-index: 5;
    flex-wrap: wrap;
    max-width: calc(100% - 24px);
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 4px 10px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .filter-btn:hover { background: #30363d; }
  .filter-btn.active { color: #f0f6fc; }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .filter-btn:not(.active) .dot { opacity: 0.3; }

  .legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 5;
    font-size: 11px;
    color: #6e7681;
  }

  .legend-link {
    color: #58a6ff;
    text-decoration: none;
  }

  .legend-link:hover { text-decoration: underline; }

  .sidebar {
    width: 420px;
    min-width: 320px;
    background: #161b22;
    border-left: 1px solid #30363d;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: #161b22;
    z-index: 1;
  }

  .sidebar-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #f0f6fc;
  }

  .close-btn {
    background: none;
    border: none;
    color: #8b949e;
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .close-btn:hover { background: #21262d; color: #f0f6fc; }

  .sidebar-content { padding: 20px; flex: 1; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8b949e;
    text-align: center;
    padding: 40px;
  }

  .empty-state h2 { font-size: 18px; color: #f0f6fc; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .badge-actor { background: #1f3a5f; color: #58a6ff; }
  .badge-action-type { background: #3b2f1a; color: #d29922; }
  .badge-process { background: #1a3b2f; color: #3fb950; }
  .badge-mechanism { background: #2d1f3b; color: #bc8cff; }
  .badge-artifact { background: #3b1f2f; color: #f778ba; }
  .badge-concept { background: #1f2d3b; color: #79c0ff; }
  .badge-param-group { background: #3b2f1a; color: #e3b341; }
  .badge-parameter { background: #2f3b1a; color: #a5d6a7; }
  .badge-tool { background: #1a2f3b; color: #56d4dd; }

  .description {
    font-size: 14px;
    line-height: 1.65;
    color: #c9d1d9;
    margin-bottom: 20px;
  }

  .links { list-style: none; margin-bottom: 16px; }
  .links li { margin-bottom: 8px; }

  .links a {
    color: #58a6ff;
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #30363d;
    transition: all 0.15s ease;
  }

  .links a:hover { background: #1f2937; border-color: #58a6ff; }
  .links a::before { content: '\2197'; font-size: 11px; }

  .connections {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #30363d;
  }

  .connections h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8b949e;
    margin-bottom: 10px;
  }

  .connection-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 4px;
    transition: background 0.15s ease;
  }

  .connection-item:hover { background: #21262d; }
  .conn-label { color: #8b949e; font-size: 11px; font-style: italic; }
  .conn-node { color: #f0f6fc; font-weight: 500; }

  .edge-detail {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 16px;
  }

  .edge-endpoint {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .edge-role {
    font-size: 11px;
    text-transform: uppercase;
    color: #8b949e;
    min-width: 36px;
  }

  .edge-name {
    font-size: 15px;
    font-weight: 600;
    color: #f0f6fc;
  }

  .edge-label {
    font-size: 14px;
    color: #bc8cff;
    padding: 8px 14px;
    background: #2d1f3b;
    border-radius: 8px;
    text-align: center;
  }

  .tour-menu-wrapper { position: relative; }

  .tour-menu {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 6px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    width: 320px;
    max-height: 400px;
    overflow-y: auto;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .tour-menu-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s ease;
  }

  .tour-menu-item:last-child { border-bottom: none; }
  .tour-menu-item:hover { background: #21262d; }

  .tour-menu-title {
    font-size: 14px;
    font-weight: 600;
    color: #f0f6fc;
    margin-bottom: 4px;
  }

  .tour-menu-desc {
    font-size: 12px;
    color: #8b949e;
    line-height: 1.4;
  }

  .tutorial-start-btn {
    margin-top: 16px;
    background: #1f3a5f;
    border: 1px solid #58a6ff;
    color: #58a6ff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s ease;
  }

  .tutorial-start-btn:hover { background: #264a73; }

  .tutorial-content {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tutorial-topbar {
    position: sticky;
    top: 0;
    background: #161b22;
    padding: 12px 0;
    z-index: 2;
    border-bottom: 1px solid #30363d;
    margin: -20px -20px 16px -20px;
    padding: 12px 20px;
  }

  .tutorial-progress {
    font-size: 12px;
    color: #8b949e;
    letter-spacing: 1px;
  }

  .tutorial-narrative { line-height: 1.7; }

  .tutorial-para {
    font-size: 14px;
    color: #c9d1d9;
    margin-bottom: 12px;
  }

  .tutorial-nav {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .tutorial-nav-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s ease;
  }

  .tutorial-nav-btn:hover { background: #30363d; }
  .tutorial-nav-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }
  .tutorial-nav-btn.recenter { background: #2d1f3b; border-color: #bc8cff; color: #bc8cff; }

  .tutorial-exit {
    background: none;
    border: none;
    color: #8b949e;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    margin-left: auto;
  }

  .tutorial-exit:hover { color: #c9d1d9; }

  .narrative-node-link {
    color: #58a6ff;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
  }

  .narrative-node-link:hover { text-decoration-style: solid; color: #79c0ff; }

  .narrative-ext-link {
    color: #58a6ff;
    text-decoration: none;
  }

  .narrative-ext-link:hover { text-decoration: underline; }

  .tutorial-hovered-node { margin-top: 8px; }

  .tutorial-hovered-divider {
    height: 1px;
    background: #30363d;
    margin-bottom: 16px;
  }

  .tutorial-hovered-label {
    font-size: 15px;
    font-weight: 600;
    color: #f0f6fc;
    margin: 8px 0;
  }

  .tutorial-hovered-desc {
    font-size: 13px;
    line-height: 1.6;
    color: #8b949e;
  }

  /* Prompt builder */
  .prompt-builder {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #30363d;
  }

  .prompt-builder h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8b949e;
    margin-bottom: 10px;
  }

  .prompt-textarea {
    width: 100%;
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 60px;
  }

  .prompt-textarea:focus { border-color: #58a6ff; background: #161b22; }

  .prompt-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .prompt-copy-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s ease;
  }

  .prompt-copy-btn:hover { background: #30363d; border-color: #8b949e; }
  .prompt-copy-btn.copied { background: #1a3b2f; border-color: #3fb950; color: #3fb950; }

  /* App shell: repo panel + main area */
  .app-shell {
    display: flex;
    height: 100vh;
  }

  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .empty-main {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8b949e;
    font-size: 16px;
  }

  /* Repo panel (left sidebar) */
  .repo-panel {
    width: 280px;
    min-width: 200px;
    background: #0d1117;
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    position: relative;
    flex-shrink: 0;
  }

  .repo-form {
    padding: 12px;
    border-bottom: 1px solid #30363d;
    display: flex;
    gap: 8px;
  }

  .repo-input {
    flex: 1;
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }

  .repo-input:focus { border-color: #58a6ff; }

  .repo-add-btn {
    background: #1f3a5f;
    border: 1px solid #58a6ff;
    color: #58a6ff;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    white-space: nowrap;
  }

  .repo-add-btn:hover { background: #264a73; }

  .repo-error {
    padding: 8px 12px;
    color: #f85149;
    font-size: 12px;
    background: #1a0000;
    border-bottom: 1px solid #30363d;
  }

  .repo-list {
    flex: 1;
    overflow-y: auto;
  }

  .repo-item {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
  }

  .repo-item:hover { background: #161b22; }
  .repo-item.active { background: #1f3a5f; border-left: 3px solid #58a6ff; }

  .repo-item-title {
    font-size: 13px;
    font-weight: 600;
    color: #f0f6fc;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .repo-item-id {
    font-size: 11px;
    color: #8b949e;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .repo-delete-btn {
    position: absolute;
    right: 8px;
    top: 8px;
    background: none;
    border: none;
    color: #8b949e;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .repo-item:hover .repo-delete-btn { opacity: 1; }
  .repo-delete-btn:hover { background: #21262d; color: #f85149; }

  .repo-resize-handle {
    position: absolute;
    right: -3px;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: col-resize;
    z-index: 10;
  }

  .repo-resize-handle:hover { background: #58a6ff40; }

  @media (max-width: 768px) {
    .sidebar {
      width: 100%;
      position: absolute;
      right: 0; top: 0; bottom: 0;
      z-index: 10;
    }
    .repo-panel { display: none; }
  }
</style>
</head>
<body>
<script src="index.js"></script>
</body>
</html>
