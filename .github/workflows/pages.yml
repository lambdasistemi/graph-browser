name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: |
          nix develop --quiet -c just install
          nix develop --quiet -c just bundle-lib
          mkdir -p dist/lib
          cp dist/index.html dist/lib/index.html
          cp dist/index.js dist/lib/index.js
          nix develop --quiet -c just bundle-app
          nix develop --quiet -c just build-docs
          cp -r schema dist/schema
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
